<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title">
  <title id="title">Bulsa smiling wallet</title>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffb1c0"/><stop offset="1" stop-color="#ef7893"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#ab6f7d" flood-opacity=".22"/></filter>
  </defs>
  <style>
    .wallet{transform-origin:90px 100px;animation:float 3s ease-in-out infinite}.eye{transform-origin:center;animation:blink 4s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-7px) rotate(1deg)}}
    @keyframes blink{0%,44%,52%,100%{transform:scaleY(1)}48%{transform:scaleY(.12)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <g class="wallet" filter="url(#shadow)">
    <path d="M39 53c0-10 8-18 18-18h68c8 0 15 5 17 12l7 22H52c-7 0-13-6-13-13v-3Z" fill="#cd5d77"/>
    <rect x="26" y="57" width="132" height="94" rx="25" fill="url(#body)"/>
    <path d="M26 82c32 15 88 15 132 1" fill="none" stroke="#ffe6ec" stroke-width="4" stroke-linecap="round" opacity=".6"/>
    <rect x="119" y="88" width="48" height="38" rx="15" fill="#cd5d77"/><circle cx="139" cy="107" r="5" fill="#ffe6ec"/>
    <circle class="eye" cx="65" cy="106" r="5" fill="#3f3034"/><circle class="eye" cx="96" cy="106" r="5" fill="#3f3034"/>
    <path d="M72 122q8 9 17 0" fill="none" stroke="#3f3034" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="49" cy="121" rx="9" ry="5" fill="#ff557b" opacity=".55"/><ellipse cx="108" cy="121" rx="8" ry="5" fill="#ff557b" opacity=".55"/>
  </g>
</svg>
